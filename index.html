<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典贪吃蛇</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1C1C1E; /* iOS 深色模式背景 */
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 禁用缩放和手势 */
        }

        #scoreBoard {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #0A84FF; /* iOS 蓝色 */
            text-shadow: 0 0 10px rgba(10, 132, 255, 0.3);
        }

        canvas {
            background: #000;
            border: 2px solid #3A3A3C;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 95vw;
        }

        /* 优化后的按钮布局 */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 35px;
        }

        .control-btn {
            background: #2C2C2E;
            color: white;
            width: 80px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.1s; /* 增加过渡动画 */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* 点击时的视觉强反馈 */
        .control-btn:active {
            background: #0A84FF; /* 点击变蓝 */
            transform: scale(0.85);
            box-shadow: 0 0 15px rgba(10, 132, 255, 0.6);
        }

        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2;}
        .right { grid-column: 3; grid-row: 2;}
        .down { grid-column: 2; grid-row: 3;}

        #msg {
            position: absolute;
            background: rgba(28, 28, 30, 0.95);
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            display: none;
            border: 2px solid #32D74B;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">Score: 0</div>
    <canvas id="gameCanvas" width="360" height="360"></canvas>

    <div id="msg">
        <h2 style="margin:0; color:#32D74B;">Game Over</h2>
        <p id="finalScore" style="margin:15px 0; color:#E5E5EA;"></p>
        <button onclick="resetGame()" style="background:#32D74B; border:none; color:#000; padding:12px 30px; border-radius:12px; font-weight:bold; font-size:18px;">再来一局</button>
    </div>

    <div id="controls">
        <div class="control-btn up" onclick="handleInput('up')">↑</div>
        <div class="control-btn left" onclick="handleInput('left')">←</div>
        <div class="control-btn right" onclick="handleInput('right')">→</div>
        <div class="control-btn down" onclick="handleInput('down')">↓</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreBoard');
        const msgBox = document.getElementById('msg');
        const finalScoreText = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
        let food = {x: 5, y: 5};
        let direction = 'up';
        let nextDirection = 'up'; // 指令缓存，防止转弯掉头
        let isGameOver = false;

        function draw() {
            if(isGameOver) return;

            direction = nextDirection; // 在每一帧开始时应用最新方向
            
            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (direction === 'left') snakeX--;
            if (direction === 'up') snakeY--;
            if (direction === 'right') snakeX++;
            if (direction === 'down') snakeY++;

            // 穿墙逻辑
            if (snakeX < 0) snakeX = tileCount - 1;
            if (snakeX >= tileCount) snakeX = 0;
            if (snakeY < 0) snakeY = tileCount - 1;
            if (snakeY >= tileCount) snakeY = 0;

            // 唯一死法：撞到自己
            if (collision(snakeX, snakeY, snake)) {
                gameOver();
                return;
            }

            // --- 绘图部分 ---
            // 1. 背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 绘制网格辅助线 (优化：更细的深灰色)
            ctx.strokeStyle = '#1C1C1E';
            ctx.lineWidth = 1;
            for(let i=0; i<=tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0); ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize); ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 3. 吃食判定
            if (snakeX === food.x && snakeY === food.y) {
                score += 10;
                scoreElement.innerHTML = 'Score: ' + score;
                createFood();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };
            snake.unshift(newHead);

            // 4. 画食物 (带一点呼吸感的红色)
            ctx.fillStyle = '#FF453A';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 3, 0, Math.PI*2);
            ctx.fill();

            // 5. 画蛇 (蛇头和蛇身区分颜色)
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? '#30D158' : '#32D74B';
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if(collision(food.x, food.y, snake)) createFood();
        }

        function collision(x, y, array) {
            for (let i = 0; i < array.length; i++) {
                if (x === array[i].x && y === array[i].y) return true;
            }
            return false;
        }

        // 输入处理：增加方向锁定，防止 180 度自杀
        function handleInput(dir) {
            if (dir === 'left' && direction !== 'right') nextDirection = 'left';
            if (dir === 'up' && direction !== 'down') nextDirection = 'up';
            if (dir === 'right' && direction !== 'left') nextDirection = 'right';
            if (dir === 'down' && direction !== 'up') nextDirection = 'down';
        }

        function gameOver() {
            isGameOver = true;
            finalScoreText.innerText = "Final Score: " + score;
            msgBox.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            scoreElement.innerHTML = 'Score: 0';
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            direction = 'up';
            nextDirection = 'up';
            isGameOver = false;
            msgBox.style.display = 'none';
            createFood();
        }

        // 监听键盘
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') handleInput('left');
            if (e.key === 'ArrowUp') handleInput('up');
            if (e.key === 'ArrowRight') handleInput('right');
            if (e.key === 'ArrowDown') handleInput('down');
        });

        // 速度设置为 360ms，配合辅助线，节奏最舒服
        setInterval(draw, 360);
    </script>
</body>
</html>
