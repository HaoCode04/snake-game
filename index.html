<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>经典贪吃蛇 - 舒享版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1C1C1E;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #scoreBoard {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #0A84FF;
        }
        canvas {
            background: #000;
            border: 3px solid #3A3A3C;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 95vw; /* 稍微再宽一点 */
        }
        /* 按钮区域优化：变大，间距更合理 */
        #controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 30px;
            padding-bottom: 20px;
        }
        .control-btn {
            background: #2C2C2E;
            color: white;
            width: 85px;  /* 按钮从 65 增加到 85 */
            height: 85px; /* 按钮从 65 增加到 85 */
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px; /* 改为 iOS 风格的圆角矩形，触控面积更大 */
            font-size: 32px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            -webkit-tap-highlight-color: transparent;
        }
        .control-btn:active { background: #3A3A3C; transform: scale(0.9); }
        .up { grid-column: 2; }
        .left { grid-column: 1; grid-row: 2;}
        .right { grid-column: 3; grid-row: 2;}
        .down { grid-column: 2; grid-row: 3;}
        
        #msg {
            position: absolute;
            z-index: 10;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            display: none;
            border: 2px solid #32D74B;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">得分: 0</div>
    <canvas id="gameCanvas" width="360" height="360"></canvas>

    <div id="msg">
        <h2 style="margin:0; color:#32D74B;">游戏结束</h2>
        <p id="finalScore" style="margin:15px 0;"></p>
        <button onclick="resetGame()" style="background:#32D74B; border:none; color:black; padding:12px 25px; border-radius:10px; font-weight:bold; font-size:16px;">重新开始</button>
    </div>

    <div id="controls">
        <div class="control-btn up" onclick="changeDirection('up')">↑</div>
        <div class="control-btn left" onclick="changeDirection('left')">←</div>
        <div class="control-btn right" onclick="changeDirection('right')">→</div>
        <div class="control-btn down" onclick="changeDirection('down')">↓</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('scoreBoard');
        const msgBox = document.getElementById('msg');
        const finalScoreText = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let score = 0;
        let snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}]; // 初始稍微长一点点，手感更好
        let food = {x: 5, y: 5};
        let d = 'up';
        let isGameOver = false;

        function draw() {
            if(isGameOver) return;

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if (d === 'left') snakeX--;
            if (d === 'up') snakeY--;
            if (d === 'right') snakeX++;
            if (d === 'down') snakeY++;

            // --- 核心改动：穿墙逻辑 ---
            if (snakeX < 0) snakeX = tileCount - 1;
            if (snakeX >= tileCount) snakeX = 0;
            if (snakeY < 0) snakeY = tileCount - 1;
            if (snakeY >= tileCount) snakeY = 0;

            // 唯一死法：撞到自己
            if (collision(snakeX, snakeY, snake)) {
                gameOver();
                return;
            }

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. 画背景
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. 绘制网格辅助线 (新增)
            ctx.strokeStyle = '#2C2C2E'; // 深灰色，不抢眼但能看清
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {

                // 画竖线

                ctx.beginPath();

                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);

                ctx.stroke();

                // 画横线
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            if (snakeX === food.x && snakeY === food.y) {
                score += 10;
                scoreElement.innerHTML = '得分: ' + score;
                createFood();
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };
            snake.unshift(newHead);

            // 画食物
            ctx.fillStyle = '#FF453A';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI*2);
            ctx.fill();

            // 画蛇
            snake.forEach((part, index) => {
                ctx.fillStyle = (index === 0) ? '#30D158' : '#32D74B';
                // 蛇身画得稍微圆润一点
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // 确保食物不在蛇身上
            if(collision(food.x, food.y, snake)) createFood();
        }

        function collision(x, y, array) {
            for (let i = 0; i < array.length; i++) {
                if (x === array[i].x && y === array[i].y) return true;
            }
            return false;
        }

        function gameOver() {
            isGameOver = true;
            finalScoreText.innerText = "你的得分是：" + score;
            msgBox.style.display = 'block';
        }

        function resetGame() {
            score = 0;
            scoreElement.innerHTML = '得分: 0';
            snake = [{x: 10, y: 10}, {x: 10, y: 11}, {x: 10, y: 12}];
            d = 'up';
            isGameOver = false;
            msgBox.style.display = 'none';
            createFood();
        }

        function changeDirection(dir) {
            if (dir === 'left' && d !== 'right') d = 'left';
            if (dir === 'up' && d !== 'down') d = 'up';
            if (dir === 'right' && d !== 'left') d = 'right';
            if (dir === 'down' && d !== 'up') d = 'down';
        }

        // 速度调慢到 540，玩起来更从容
        setInterval(draw, 540); 
    </script>
</body>
</html>
